version: '3.8'

services:

  db:
    image: postgres:16
    container_name: todo_db
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Aryan@95
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: todo_app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USER: postgres
      DB_PASSWORD: Aryan@95
    depends_on:
      db:
        condition: service_healthy
    networks:
      - todo_network
    restart: on-failure

networks:
  todo_network:
    driver: bridge

volumes:
  postgres_data: